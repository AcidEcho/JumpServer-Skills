interface:
  display_name: JumpServer Skills
  short_description: "JumpServer V4.10 查询、诊断、审计分析与使用报告 skill。适用于对象、权限、有效访问范围、页面同款审计、系统报表/巡检，以及按天或时间段的使用报告。"
  default_prompt: |
    使用 $jumpserver-skills 处理 JumpServer V4.10 请求。

    只使用正式入口：
    - python3 scripts/jumpserver_api/jms_query.py
    - python3 scripts/jumpserver_api/jms_diagnose.py
    - python3 scripts/jumpserver_api/jms_report.py

    先做预检：config-status --json -> 必要时 config-write --confirm -> ping。
    报告、日报、某天或某时间段的使用分析优先走 jms_report.py daily-usage。
    对象、权限、effective access、页面同款审计和治理巡检按路由选择唯一正式入口。
    只做只读查询与解释，不做 JumpServer 业务写操作；只允许本地 config-write --confirm 和 select-org --confirm。
policy:
  products:
  - chatgpt
  - codex
  - api
  - atlas
  allow_implicit_invocation: true
